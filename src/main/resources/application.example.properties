# Example configuration for an optional MariaDB setup.
# Copy these settings into application.properties only if you want to run the project with MariaDB locally.

spring.datasource.url=jdbc:mariadb://localhost:3306/hivewatchlite
spring.datasource.username=YOUR_MARIADB_USERNAME_HERE
spring.datasource.password=YOUR_MARIADB_PASSWORD_HERE
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update